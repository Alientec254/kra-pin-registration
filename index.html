<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRA Application</title>

<style>
body { font-family:'Segoe UI',sans-serif; background:#f3f7f6; padding:20px; }
.container { max-width:1000px; margin:auto; background:#fff; border-radius:20px; padding:35px; box-shadow:0 8px 30px rgba(0,0,0,0.08); border-top:5px solid #10b981; }
.header { text-align:center; margin-bottom:30px; }
.icon { width:65px; height:65px; background:#10b981; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:auto; color:white; font-size:26px; }
h1 { color:#059669; margin-top:15px; }
.sub { color:#6b7280; font-size:14px; }

.section { margin-top:25px; }
.section h3 { border-bottom:2px solid #d1fae5; padding-bottom:8px; color:#374151; }

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:15px; }
@media(max-width:768px) { .grid { grid-template-columns:1fr; } }

.field { display:flex; flex-direction:column; }
label { font-size:13px; font-weight:600; margin-bottom:6px; }

input, select { padding:14px; border-radius:10px; border:1px solid #d1d5db; outline:none; }
input:focus, select:focus { border-color:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,0.2); }

button { margin-top:25px; width:100%; padding:15px; background:#10b981; color:white; border:none; border-radius:10px; font-size:16px; cursor:pointer; }
button:hover { background:#059669; }
button:disabled { background:#9ca3af; cursor:not-allowed; }

.screen { display:none; }
.active { display:block; }

#status { margin-top:15px; text-align:center; font-weight:bold; line-height:1.5; padding:10px; border-radius:8px; }

.spinner { display:none; width:50px; height:50px; border:5px solid #f3f3f3; border-top:5px solid #10b981; border-radius:50%; animation:spin 1s linear infinite; margin:20px auto; }
@keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }

.mpesa-logo { width:100px; height:100px; margin:20px auto; display:block; }
</style>
</head>
<body>

<div class="container">

  <!-- FORM SCREEN -->
  <div id="formScreen" class="screen active">
    <div class="header">
      <div class="icon">👤</div>
      <h1>Application Form</h1>
      <div class="sub">Fill all required fields. We only contact 0780003131</div>
    </div>

    <form id="form">
      <div class="section">
        <h3>Personal Information</h3>
        <div class="grid">
          <div class="field"><label>Full Names *</label><input name="Full Names" required></div>
          <div class="field"><label>Phone Number *</label><input name="Phone Number" required></div>
          <div class="field"><label>Active Email *</label><input type="email" name="Active Email" required></div>
        </div>
      </div>

      <div class="section">
        <h3>Personal Details</h3>
        <div class="grid">
          <div class="field"><label>Date of Birth *</label><input type="date" name="Date of Birth" required></div>
          <div class="field"><label>ID Number *</label><input name="ID Number" required></div>
          <div class="field"><label>Preferred Delivery *</label>
            <select name="Preferred Delivery Method" required>
              <option value="">Select</option>
              <option>WhatsApp</option>
              <option>Email</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>Location Details</h3>
        <div class="grid">
          <div class="field"><label>County *</label><input name="County" required></div>
          <div class="field"><label>District *</label><input name="District" required></div>
          <div class="field"><label>Division *</label><input name="Division" required></div>
          <div class="field"><label>Town *</label><input name="Town" required></div>
          <div class="field"><label>P.O. Box *</label><input name="P.O. Box" required></div>
        </div>
      </div>

      <div class="consent">
        <label class="checkbox-wrapper">
          <input type="checkbox" id="consent" required>
          <span>I agree to the <a href="#" target="_blank">Privacy Policy</a>.</span>
        </label>
      </div>

      <button type="submit">Proceed to Payment</button>
    </form>
  </div>

  <!-- PAYMENT SCREEN -->
  <div id="paymentScreen" class="screen">
    <div class="header">
      <div class="icon">💳</div>
      <h1>Complete Payment</h1>
      <div class="sub">Enter your M-PESA number to receive payment prompt</div>
    </div>

    <div class="field">
      <label>M-PESA Number *</label>
      <input id="mpesa" placeholder="07XXXXXXXX" maxlength="10">
    </div>

    <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/M-PESA_LOGO-01.svg" 
         class="mpesa-logo" alt="M-PESA">

    <div id="spinner" class="spinner"></div>

    <button id="payButton" onclick="payNow()">Pay Now - KES 1</button>

    <div id="status"></div>
  </div>

</div>

<script>
// ====================== CONFIG ======================
const scriptURL = "https://script.google.com/macros/s/AKfycbxukDLNV_aKGSdLaZVGhA6epqE8h7OLPNfCUQDMnJb6I7Lk49Ks3zIeiWJEyrDORF38hg/exec";

let formDataStore = {};

// FORM SUBMISSION
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();
  if (!document.getElementById("consent").checked) {
    alert("Please agree to the privacy policy.");
    return;
  }
  formDataStore = Object.fromEntries(new FormData(this).entries());
  document.getElementById("formScreen").classList.remove("active");
  document.getElementById("paymentScreen").classList.add("active");
});

// IMPROVED PAYMENT FUNCTION
async function payNow() {
  const phoneInput = document.getElementById("mpesa").value.trim();
  const statusEl = document.getElementById("status");
  const spinner = document.getElementById("spinner");
  const payButton = document.getElementById("payButton");

  if (!phoneInput) {
    statusEl.innerText = "❌ Please enter M-PESA number";
    return;
  }

  let phone = phoneInput.replace(/\s+|\+|-/g, '');
  if (phone.startsWith("07") && phone.length === 10) {
    phone = "254" + phone.substring(1);
  }

  if (phone.length !== 12 || !phone.startsWith("254")) {
    statusEl.innerText = "❌ Invalid phone number. Use 07XXXXXXXX";
    return;
  }

  // UI Loading
  payButton.disabled = true;
  payButton.textContent = "Sending STK...";
  spinner.style.display = "block";
  statusEl.style.color = "#666";
  statusEl.innerText = "⏳ Sending M-PESA prompt to your phone...";

  try {
    const payload = {
      ...formDataStore,
      "Phone Number": phone,
      "M-PESA Number": phone,
      amount: "1"
    };

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 25000); // 25 second timeout

    const response = await fetch(scriptURL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams(payload),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    const text = await response.text();
    console.log("Raw server response:", text);

    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      result = { status: "error", message: "Invalid server response" };
    }

    if (result.status === "success") {
      statusEl.style.color = "#10b981";
      statusEl.innerHTML = `✅ STK Push Sent Successfully!<br>Check your phone and enter PIN to complete payment.`;
    } else {
      statusEl.style.color = "#dc2626";
      statusEl.innerText = `❌ ${result.message || "Failed to send STK"}`;
    }

  } catch (err) {
    console.error("Fetch Error:", err);
    statusEl.style.color = "#dc2626";
    if (err.name === "AbortError") {
      statusEl.innerText = "❌ Request timed out. Please try again.";
    } else {
      statusEl.innerText = "❌ Network error. Please check your internet and try again.";
    }
  } finally {
    setTimeout(() => {
      spinner.style.display = "none";
      payButton.disabled = false;
      payButton.textContent = "Pay Now - KES 1";
    }, 6000);
  }
}
</script>

</body>
</html>
